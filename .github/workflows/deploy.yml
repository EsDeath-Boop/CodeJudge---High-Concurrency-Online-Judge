name: Deploy to EC2

on:
  workflow_dispatch: 

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Run tests (add your tests here) ───────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio httpx

      # Uncomment when you add tests:
      # - name: Run tests
      #   run: pytest tests/ -v

      # ── 3. SSH deploy to EC2 ─────────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/codejudge

            echo "Pulling latest code..."
            git pull origin main

            echo "Rebuilding sandbox images..."
            docker build -t codejudge-cpp    ./sandbox/cpp
            docker build -t codejudge-python ./sandbox/python
            docker build -t codejudge-java   ./sandbox/java

            echo "Rebuilding and restarting services..."
            docker-compose build --no-cache api worker
            docker-compose up -d --force-recreate api worker nginx

            echo "Waiting for health check..."
            sleep 5
            curl -f http://localhost/health || exit 1

            echo "Deploy complete ✅"

      # ── 4. Notify on failure ──────────────────────────────────────────────
      - name: Notify failure
        if: failure()
        run: echo "Deployment failed — check GitHub Actions logs"
