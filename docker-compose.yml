
services:

  db:
    image: postgres:15-alpine
    container_name: codejudge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: codejudge
      POSTGRES_PASSWORD: codejudge
      POSTGRES_DB: codejudge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codejudge -d codejudge"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: codejudge_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: codejudge_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://codejudge:codejudge@db:5432/codejudge
      DATABASE_URL_SYNC: postgresql://codejudge:codejudge@db:5432/codejudge
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: codejudge_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL_SYNC: postgresql://codejudge:codejudge@db:5432/codejudge
      REDIS_URL: redis://redis:6379
      WORKER_THREADS: "4"
      DOCKER_HOST: unix:///var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codejudge_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
